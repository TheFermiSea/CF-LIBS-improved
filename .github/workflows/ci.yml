name: CF-LIBS CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev", "feat/adr-0001-pattern-survey-impl" ]
  pull_request:
    branches: [ "main", "dev", "feat/adr-0001-pattern-survey-impl" ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORMS: cpu
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,ci]"

    - name: Lint with Ruff
      run: |
        ruff check cflibs/ tests/

    - name: Format Check with Black
      run: |
        black --check cflibs/

    - name: Type Check with MyPy
      run: |
        mypy cflibs/

    - name: Test with Pytest
      run: |
        pytest tests/ --ignore=tests/jitpipe -m "not requires_db and not requires_bayesian and not requires_rust and not slow"

    - name: Test jitpipe parity suite (isolated)
      # The jitpipe/ parity tests compare JAX stages against the reference
      # physics and must run in a FRESH process: accumulated process-global
      # state from the upstream suite (JAX compilation cache, atomic/partition
      # memoization, fp64 flag) can perturb a reference fit and silently change
      # a setup precondition (test_parity_j6 measure_stark_ne n_lines 3 -> 1).
      # The suite passes deterministically in isolation; a dedicated invocation
      # guarantees that. (tests/jitpipe/conftest.py adds in-suite hermetic resets
      # so a combined local `pytest tests/` run stays green too.)
      run: |
        pytest tests/jitpipe -m "not requires_db and not requires_bayesian and not requires_rust and not slow"
