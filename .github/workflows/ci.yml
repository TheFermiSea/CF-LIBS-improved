name: CF-LIBS CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev", "feat/adr-0001-pattern-survey-impl" ]
  pull_request:
    branches: [ "main", "dev", "feat/adr-0001-pattern-survey-impl" ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    env:
      JAX_PLATFORMS: cpu
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,ci]"

    # --- BLOCKING gates: the checks that catch real breakage ---------------
    # Ruff stays blocking: it enforces the one HARD project guardrail via
    # TID251 -- the physics-only constraint (no sklearn/torch/tf/jax.nn/jaxopt
    # etc. in the shipped algorithm). Cheap and load-bearing.
    - name: Lint with Ruff
      run: |
        ruff check cflibs/ tests/

    # Functional test suite stays blocking: a real test failure here means
    # something is actually broken.
    - name: Test with Pytest
      run: |
        pytest tests/ --ignore=tests/jitpipe -m "not requires_db and not requires_bayesian and not requires_rust and not slow"

    # --- ADVISORY checks: informative, NOT merge-blocking ------------------
    # Rationale: zero users / no production to protect, and these checks are
    # either trivially auto-fixable (black) or research-grade strict (mypy on a
    # heavily-typed scientific codebase; the bit-exact JAX-vs-reference parity
    # suite, which is brittle to environment/test-ordering). Keeping them as
    # `continue-on-error` lets them run and report without blocking iteration.
    # Parity is gated per-stage by the integration workflow before merge anyway.
    - name: Format Check with Black (advisory)
      continue-on-error: true
      run: |
        black --check cflibs/

    - name: Type Check with MyPy (advisory)
      continue-on-error: true
      run: |
        mypy cflibs/

    - name: jitpipe parity suite (advisory, isolated)
      continue-on-error: true
      run: |
        pytest tests/jitpipe -m "not requires_db and not requires_bayesian and not requires_rust and not slow"
