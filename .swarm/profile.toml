# CF-LIBS Language Profile for beefcake-loop
# Defines quality gates, source extensions, and auto-fix commands
# for the autonomous code improvement engine.

language = "python"
source_extensions = [".py", ".pyi"]
package_manifest = "pyproject.toml"
integration_files = ["pyproject.toml", "setup.py", "conftest.py", "__init__.py"]

# Quality gates run in order. Blocking gates stop the pipeline on failure.

[[gates]]
name = "lint"
command = "ruff"
args = ["check", "cflibs/", "tests/"]
blocking = true
timeout_secs = 120

[[gates]]
name = "format"
command = "black"
args = ["--check", "cflibs/"]
blocking = true
timeout_secs = 120

[[gates]]
name = "typecheck"
command = "mypy"
args = ["cflibs/"]
blocking = false    # advisory — mypy has incrementally-disabled error codes
timeout_secs = 300

# Test gate: non-blocking (advisory) because worktrees don't inherit the
# main repo's .venv/ (it's gitignored). Tests require numpy/scipy which
# are only in the venv. Lint+format+typecheck are the meaningful gates.
# TODO: Symlink .venv/ in worktree_bridge (like .beads/) for test support.
[[gates]]
name = "test"
command = "bash"
args = ["-c", "[ -f .venv/bin/activate ] && source .venv/bin/activate; pytest tests/ -x -q -m 'not slow and not requires_db and not requires_jax' 2>&1 || echo 'pytest unavailable (no venv)'"]
blocking = false
timeout_secs = 600

# Auto-fix commands run before LLM delegation to handle trivial issues.

[[auto_fix]]
command = "black"
args = ["cflibs/"]

[[auto_fix]]
command = "ruff"
args = ["check", "--fix", "cflibs/"]
