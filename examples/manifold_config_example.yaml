# Manifold Generation Configuration
# Generates a pre-computed spectral manifold for fast inference

manifold:
  # Database and output
  db_path: ASD_da/libs_production.db
  output_path: spectral_manifold.h5
  
  # Elements to include
  elements:
    - Ti
    - Al
    - V
    - Fe
  
  # Wavelength range (nm)
  wavelength_range: [250.0, 550.0]
  
  # Temperature grid (eV)
  temperature_range: [0.5, 2.0]
  temperature_steps: 50
  
  # Electron density grid (cm^-3, log space)
  density_range: [1e16, 1e19]
  density_steps: 20
  
  # Concentration grid resolution
  concentration_steps: 20
  
  # Output spectrum resolution
  # 18432 pixels over the 250-550 nm window gives Δλ ≈ 0.0163 nm/pixel,
  # i.e. ~3.07 px/FWHM at instrument_fwhm_nm = 0.05 nm. This meets the
  # Robertson 2017 / Demidov 2022 ≥3 px/FWHM standard for line-shape and
  # pixel-integrated flux accuracy. ManifoldConfig.validate() enforces this.
  pixels: 18432
  
  # Time integration parameters (for ultrafast plasmas)
  gate_delay_s: 3.0e-7    # 300 ns
  gate_width_s: 5.0e-6    # 5 us
  time_steps: 20          # Integration resolution

  # Cooling-trail laws for the time-integration model:
  #   X(t) = X_max * (1 + t / cooling_t0_s) ** exponent
  # Defaults below reproduce the historical hardcoded ns-ICCD behaviour.
  # For a ps regime (e.g. 1 ps Yb:fiber at 1040 nm, T ~ 0.5-1.3 eV) use a
  # much smaller cooling_t0_s (e.g. ~1e-11 s).
  cooling_t0_s: 1.0e-6                  # cooling reference timescale (s)
  cooling_temperature_exponent: -0.5   # T ~ (1 + t/t0)^-0.5
  cooling_density_exponent: -1.0       # n_e ~ (1 + t/t0)^-1

  # GPU batch size (adjust based on VRAM)
  batch_size: 1000

